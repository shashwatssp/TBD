kind = "mobile"
previewPath = "/"
title = "Vivah - Wedding Task Manager"
version = "1.0.0"
id = "artifacts/vivah"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
localPort = 20041
name = "expo"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/vivah run dev"

[services.env]
PORT = "20041"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/vivah", "run", "build"]
run = ["pnpm", "--filter", "@workspace/vivah", "run", "serve"]
